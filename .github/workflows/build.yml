name: Build LightCycles

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # если одна платформа упала — остальные продолжают
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # ── Получить исходники ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux: установить ncurses ───────────────────────────────────────────
      - name: Install ncurses (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libncurses5-dev

      # ── macOS: установить ncurses ───────────────────────────────────────────
      - name: Install ncurses (macOS)
        if: runner.os == 'macOS'
        run: brew install ncurses

      # ── Windows: установить PDCurses через встроенный vcpkg ────────────────
      - name: Install PDCurses (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install pdcurses:x64-windows

      # ── Генерация CMake-проекта ─────────────────────────────────────────────
      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_MANIFEST_MODE=OFF

      # ── Сборка ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release

      # ── Упаковка артефактов (скачать готовые бинарники из GitHub) ──────────
      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: LightCycles-linux
          path: build/LightCycles

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: LightCycles-macos
          path: build/LightCycles

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: LightCycles-windows
          path: build/Release/LightCycles.exe

name: Build LightCycles

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # ── Получить исходники ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Очистка старого кэша CMake (на случай если папка попала в репо) ────
      - name: Clean build dir (Linux / macOS)
        if: runner.os != 'Windows'
        run: rm -rf build

      - name: Clean build dir (Windows)
        if: runner.os == 'Windows'
        run: if (Test-Path build) { Remove-Item -Recurse -Force build }
        shell: pwsh

      # ── Linux: установить ncursesw ──────────────────────────────────────────
      - name: Install ncursesw (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libncursesw5-dev

      # ── macOS: установить ncurses ───────────────────────────────────────────
      - name: Install ncurses (macOS)
        if: runner.os == 'macOS'
        run: brew install ncurses

      # ── Windows: установить PDCurses через vcpkg ────────────────────────────
      - name: Install PDCurses (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install pdcurses:x64-windows
        shell: pwsh

      # ── Генерация CMake-проекта ─────────────────────────────────────────────
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCURSES_INCLUDE_DIR=$(brew --prefix ncurses)/include \
            -DCURSES_LIBRARY=$(brew --prefix ncurses)/lib/libncurses.a

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_MANIFEST_MODE=OFF
        shell: pwsh

      # ── Сборка ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release

      # ── Артефакты ──────────────────────────────────────────────────────────
      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: LightCycles-linux
          path: build/LightCycles

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: LightCycles-macos
          path: build/LightCycles

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: LightCycles-windows
          path: build/Release/LightCycles.exe
